<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 我们的爱的小屋 ❤️</title>
<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #fdf6ec;
  background-image: url('https://picsum.photos/id/175/2000/2000');
  background-size: cover;
  background-attachment: fixed;
  background-repeat: no-repeat;
  color: #5a3939;
  padding: 20px;
}

/* 小屋标题 */
.house-title {
  text-align: center;
  font-size: 32px;
  color: #e65c7c;
  margin: 30px 0;
  position: relative;
}

/* 手绘卡片风格 */
.card {
  background: #fff;
  border-radius: 15px;
  padding: 25px;
  margin: 25px auto;
  max-width: 700px;
  box-shadow: 0 0 20px rgba(0,0,0,0.08);
  border: 3px dashed #f8b2b2;
  position: relative;
  overflow: hidden;
}

.card h2 {
  color: #e65c7c;
  margin-bottom: 15px;
  font-size: 22px;
}

.card p {
  line-height: 1.8;
  font-size: 16px;
  margin-bottom: 10px;
}

/* 照片墙 */
.photo-wall {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-top: 15px;
}

.photo-wall img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid #ffccd5;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* 留言板 */
.message-board {
  background: #fff9fb;
  border: 2px dashed #ffb6c1;
  border-radius: 12px;
  padding: 20px;
  margin-top: 15px;
}

.message-board input,
.message-board textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ffccd5;
  border-radius: 8px;
  font-size: 15px;
}

.message-board button {
  background: #ff7b9c;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 15px;
}

.message-list {
  margin-top: 15px;
  max-height: 250px;
  overflow-y: auto;
}

.message-item {
  background: #ffeef2;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-size: 14px;
}

/* 小挂件装饰 */
.hanging {
  position: absolute;
  width: 40px;
  opacity: 0.8;
}
.hang1 { top:10px; left:15px; }
.hang2 { top:10px; right:15px; }

/* 底部 */
.footer {
  text-align: center;
  padding: 30px 0;
  color: #999;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="house-title">
  ❤️ 我们的爱的小屋 ❤️<br>
  <small>像恶作剧之吻一样 温暖又可爱</small>
</div>

<!-- 小屋介绍 -->
<div class="card">
  <img class="hanging hang1" src="https://picsum.photos/id/30/100/100">
  <img class="hanging hang2" src="https://picsum.photos/id/31/100/100">
  <h2>🏠 小屋介绍</h2>
  <p>这里是我和老婆专属的小天地，像《恶作剧之吻》里的爱的小屋一样。</p>
  <p>我们会在这里记录生活、心情、旅行、日常，永远温暖。</p>
</div>

<!-- 我们的日记 -->
<div class="card">
  <h2>✏️ 我们的小日记</h2>
  <p>【2025.xx.xx】今天一起吃了火锅，超开心～</p>
  <p>【2025.xx.xx】一起看了恶作剧之吻，好甜呀！</p>
  <p>【2025.xx.xx】新的一天，爱你多一点～</p>
</div>

<!-- 照片墙 -->
<div class="card">
  <h2>📷 我们的照片墙</h2>
  <div class="photo-wall">
    <img src="https://picsum.photos/id/64/300/300">
    <img src="https://picsum.photos/id/65/300/300">
    <img src="https://picsum.photos/id/66/300/300">
    <img src="https://picsum.photos/id/67/300/300">
    <img src="https://picsum.photos/id/68/300/300">
  </div>
</div>

<!-- 留言板 -->
<div class="card">
  <h2>💌 小屋留言板</h2>
  <div class="message-board">
    <input type="text" id="name" placeholder="你的名字～">
    <textarea id="msg" rows="3" placeholder="说点什么吧～"></textarea>
    <button onclick="sendMsg()">提交留言</button>

    <div class="message-list" id="msgList"></div>
  </div>
</div>

<div class="footer">
  ❤️ 我们的爱的小屋 | 永远温暖
</div>

<script>
// 留言功能
function sendMsg(){
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;
  if(!name || !msg) return alert("请填写完整哦～");
  
  let list = document.getElementById("msgList");
  let item = document.createElement("div");
  item.className = "message-item";
  item.innerText = name + "：" + msg;
  list.prepend(item);
  
  document.getElementById("name").value = "";
  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
